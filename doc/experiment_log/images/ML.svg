<svg width="100%" viewBox="0 0 820 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Autoencoder architecture two row visualization</title>
<desc>Neural network architecture with encoder in top row and decoder in bottom row</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Section labels -->
<text x="40" y="25" style="fill:rgb(194,192,182);font-size:12px;">Encoder</text>
<text x="40" y="205" style="fill:rgb(194,192,182);font-size:12px;">Decoder</text>

<!-- ── ENCODER ROW ──────────────────────────────────────────────────── -->

<!-- Input  x=40 cx=75 -->
<rect x="40" y="40" width="70" height="50" rx="6" style="fill:rgb(68,68,65);stroke:rgb(180,178,169);stroke-width:0.5px;"/>
<text x="75" y="57" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211,209,199);font-size:14px;font-weight:500;">Input</text>
<text x="75" y="73" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180,178,169);font-size:12px;">8×8×1</text>
<line x1="110" y1="65" x2="155" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- enc_conv1  x=155 cx=190 -->
<rect x="155" y="40" width="70" height="50" rx="6" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="190" y="55" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;">Conv2D</text>
<text x="190" y="68" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">8×3×3</text>
<text x="190" y="80" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">8×8×8</text>
<line x1="225" y1="65" x2="270" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- enc_conv2  x=270 cx=305 -->
<rect x="270" y="40" width="70" height="50" rx="6" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="305" y="55" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;">Conv2D</text>
<text x="305" y="68" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">16×3×3</text>
<text x="305" y="80" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">8×8×16</text>
<line x1="340" y1="65" x2="385" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- enc_pool1  x=385 cx=420 -->
<rect x="385" y="40" width="70" height="50" rx="6" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px;"/>
<text x="420" y="57" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500;">MaxPool</text>
<text x="420" y="73" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;">4×4×16</text>
<line x1="455" y1="65" x2="500" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- enc_conv3  x=500 cx=535 -->
<rect x="500" y="40" width="70" height="50" rx="6" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="535" y="55" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;">Conv2D</text>
<text x="535" y="68" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">16×3×3</text>
<text x="535" y="80" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">4×4×16</text>
<line x1="570" y1="65" x2="615" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- enc_pool2  x=615 cx=650 -->
<rect x="615" y="40" width="70" height="50" rx="6" style="fill:rgb(8,80,65);stroke:rgb(93,202,165);stroke-width:0.5px;"/>
<text x="650" y="57" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159,225,203);font-size:14px;font-weight:500;">MaxPool</text>
<text x="650" y="73" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93,202,165);font-size:12px;">2×2×16</text>
<line x1="685" y1="65" x2="730" y2="65" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- Bottleneck  x=730 cx=765 -->
<rect x="730" y="40" width="70" height="50" rx="6" style="fill:rgb(99,56,6);stroke:rgb(239,159,39);stroke-width:0.5px;"/>
<text x="765" y="55" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250,199,117);font-size:14px;font-weight:500;">Conv2D</text>
<text x="765" y="68" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);font-size:12px;">16×3×3</text>
<text x="765" y="80" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239,159,39);font-size:12px;">2×2×16</text>

<!-- Vertical arrow down to decoder -->
<line x1="765" y1="90" x2="765" y2="120" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>
<text x="765" y="145" text-anchor="middle" style="fill:rgb(194,192,182);font-size:12px;">Bottleneck</text>
<line x1="765" y1="152" x2="765" y2="180" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- ── DECODER ROW (right → left) ──────────────────────────────────── -->

<!-- dec_up1  x=730 cx=765 -->
<rect x="730" y="180" width="70" height="50" rx="6" style="fill:rgb(39,80,10);stroke:rgb(151,196,89);stroke-width:0.5px;"/>
<text x="765" y="197" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192,221,151);font-size:14px;font-weight:500;">UpSample</text>
<text x="765" y="213" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:12px;">4×4×16</text>
<line x1="730" y1="205" x2="685" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- dec_conv1  x=615 cx=650 -->
<rect x="615" y="180" width="70" height="50" rx="6" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="650" y="195" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;">Conv2D</text>
<text x="650" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">16×3×3</text>
<text x="650" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">4×4×16</text>
<line x1="615" y1="205" x2="570" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- dec_up2  x=500 cx=535 -->
<rect x="500" y="180" width="70" height="50" rx="6" style="fill:rgb(39,80,10);stroke:rgb(151,196,89);stroke-width:0.5px;"/>
<text x="535" y="197" text-anchor="middle" dominant-baseline="central" style="fill:rgb(192,221,151);font-size:14px;font-weight:500;">UpSample</text>
<text x="535" y="213" text-anchor="middle" dominant-baseline="central" style="fill:rgb(151,196,89);font-size:12px;">8×8×16</text>
<line x1="500" y1="205" x2="455" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- dec_conv2  x=385 cx=420 -->
<rect x="385" y="180" width="70" height="50" rx="6" style="fill:rgb(12,68,124);stroke:rgb(133,183,235);stroke-width:0.5px;"/>
<text x="420" y="195" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181,212,244);font-size:14px;font-weight:500;">Conv2D</text>
<text x="420" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">8×3×3</text>
<text x="420" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133,183,235);font-size:12px;">8×8×8</text>
<line x1="385" y1="205" x2="340" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- GAP  x=270 cx=305 -->
<rect x="270" y="180" width="70" height="50" rx="6" style="fill:rgb(113,43,19);stroke:rgb(240,153,123);stroke-width:0.5px;"/>
<text x="305" y="195" text-anchor="middle" dominant-baseline="central" style="fill:rgb(245,196,179);font-size:14px;font-weight:500;">GAP</text>
<text x="305" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;">Spatial→8</text>
<text x="305" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240,153,123);font-size:12px;">8 feat</text>
<line x1="270" y1="205" x2="225" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- Dense1  x=155 cx=190 -->
<rect x="155" y="180" width="70" height="50" rx="6" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"/>
<text x="190" y="195" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:14px;font-weight:500;">Dense</text>
<text x="190" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;">16 ReLU</text>
<text x="190" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;">16 feat</text>
<line x1="155" y1="205" x2="110" y2="205" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156,154,146);stroke-width:1.5px;"/>

<!-- Dense output  x=40 cx=75 -->
<rect x="40" y="180" width="70" height="50" rx="6" style="fill:rgb(60,52,137);stroke:rgb(175,169,236);stroke-width:0.5px;"/>
<text x="75" y="195" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206,203,246);font-size:14px;font-weight:500;">Dense</text>
<text x="75" y="208" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;">4 linear</text>
<text x="75" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175,169,236);font-size:12px;">4 classes</text>

<!-- Classification Head label -->
<text x="40" y="270" style="fill:rgb(194,192,182);font-size:12px;">Classification Head</text>
</svg>
